<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>ギターストローク・マスター</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="data:application/manifest+json,{%22name%22:%22ギターストローク・マスター%22,%22short_name%22:%22ギタスト%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22orientation%22:%22portrait%22,%22background_color%22:%22%23fff8ed%22,%22theme_color%22:%22%23ffb94f%22,%22icons%22:[{%22src%22:%22data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' fill='%23ffdd5c'><circle cx='50' cy='50' r='50'/><text x='50' y='65' font-size='50' text-anchor='middle'>🎸</text></svg>%22,%22sizes%22:%22512x512%22,%22type%22:%22image/svg+xml%22}]}">

<style>
  :root{
    --ink:#302257; --soft:#fff8ed; --cream:#fff0cf; --yellow:#ffdd5c;
    --red:#ef6478; --blue:#5ba7e8; --purple:#9274df; --green:#70d99a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select: none;}
  body{margin:0; font-family:-apple-system,BlinkMacSystemFont,"Hiragino Maru Gothic ProN","Hiragino Sans",system-ui,sans-serif; background:repeating-linear-gradient(135deg,#ffc462 0 28px,#ffb94f 28px 56px); color:var(--ink); min-height:100vh; display:flex; justify-content:center; overflow-x:hidden}
  .phone{width:min(100vw,520px); min-height:100vh; background:var(--soft); border-left:6px solid var(--ink); border-right:6px solid var(--ink); padding:calc(28px + env(safe-area-inset-top)) 20px calc(22px + env(safe-area-inset-bottom)); position:relative; overflow:hidden; display: flex; flex-direction: column;}
  h1{font-size:32px; text-align:center; margin:4px 0 6px; letter-spacing:.03em; font-weight:900}
  .sub{text-align:center; font-weight:800; color:#7c6f9e; font-size:17px; line-height:1.55; margin-bottom:18px}
  .controls{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin:8px 0 16px}
  .card{background:var(--cream); border:4px solid var(--ink); border-radius:18px; padding:12px 10px; box-shadow:0 6px 0 var(--ink)}
  label{font-weight:900; color:#796c9d; display:block; margin-bottom:8px; font-size:15px}
  input,select{width:100%; border:4px solid var(--ink); border-radius:14px; padding:11px 8px; color:var(--ink); font-size:18px; font-weight:900; background:white}
  button{font:inherit; color:var(--ink); border:4px solid var(--ink); border-radius:18px; font-weight:900; cursor:pointer; box-shadow:0 8px 0 var(--ink); transform:translateY(0); touch-action:manipulation}
  button:active{transform:translateY(5px); box-shadow:0 3px 0 var(--ink)}
  .start{width:100%; background:var(--yellow); padding:24px 10px; font-size:30px; margin:18px 0 28px}
  .lane{position:relative; height:94px; margin:10px 0 6px; display:flex; align-items:center; justify-content:space-between}
  .line{position:absolute; left:-10px; right:-10px; height:4px; background:#7d7397; top:45px; z-index:0}
  .beat{z-index:1; width:48px; height:58px; border:4px solid var(--ink); border-radius:50%; background:white; display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:900; transition:.12s}
  .beat.hit{background:#fff2a8; transform:scale(1.18)} .beat.now{outline:6px solid rgba(255,221,92,.7)}
  .nums{display:flex; justify-content:space-between; padding:0 5px; font-weight:900; color:#3b2b67; font-size:17px; margin-bottom:8px}
  .judge{text-align:center; min-height:86px; font-size:42px; font-weight:1000; display:flex; align-items:center; justify-content:center; flex-direction:column; line-height:1.05; flex-grow: 1;}
  .score{font-size:17px; color:#7b6c9b; margin-top:8px}
  .pads{display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; padding-top:12px; background:linear-gradient(transparent,var(--soft) 25%)}
  .pad{height:112px; color:white; text-shadow:0 2px 0 rgba(0,0,0,.12); font-size:24px; line-height:1.3; white-space:pre-line}
  .down{background:var(--red)} .up{background:var(--blue)} .mute{background:var(--purple)}
  .mini{font-size:14px; display:block; margin-top:7px}
  .flash{position:absolute; inset:0; pointer-events:none; opacity:0; background:radial-gradient(circle at center, rgba(255,221,92,.55), transparent 55%); transition:opacity .18s}
  .flash.on{opacity:1}.hint{font-size:13px; color:#7b6c9b; text-align:center; margin:10px 0 0; line-height:1.45}.smallrow{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px}.tiny{padding:10px; background:#fff; font-size:14px; box-shadow:0 4px 0 var(--ink)}
  @media(max-width:390px){h1{font-size:25px}.phone{padding-left:14px;padding-right:14px}.pad{font-size:21px;height:102px}.controls{gap:7px}.card{padding:10px 7px}.beat{width:42px;height:52px}.judge{font-size:36px}}
</style>
</head>
<body>
<div class="phone">
  <div class="flash" id="flash"></div>
  <h1>🎸 ギターストローク・マスター</h1>
  <div class="sub">正しいタイミングで<br>「ダウン・アップ・ミュート」を押そう</div>

  <div class="controls">
    <div class="card"><label>BPM</label><input id="bpm" type="number" min="50" max="180" value="90"></div>
    <div class="card"><label>リズム</label><select id="pattern"></select></div>
    <div class="card"><label>小節数</label><select id="bars"><option>2</option><option selected>4</option><option>8</option></select></div>
  </div>
  <button class="start" id="start">スタート</button>
  <div class="lane"><div class="line"></div><div id="beats" style="display:contents"></div></div>
  <div class="nums" id="nums"></div>
  <div class="judge" id="judge">Ready?<div class="score" id="score">PERFECTをねらおう</div></div>
  <div class="pads">
    <button class="pad down" id="down">↓ ダウン<span class="mini">キー：D</span></button>
    <button class="pad up" id="up">↑ アップ<span class="mini">キー：F</span></button>
    <button class="pad mute" id="mute">× ミュート<span class="mini">キー：J</span></button>
  </div>
  <div class="smallrow"><button class="tiny" id="stop">停止</button><button class="tiny" id="installBtn" style="display:none;">アプリをインストール</button></div>
  <div class="hint" id="iosHint">iPhoneはブラウザの [共有ボタン] →「ホーム画面に追加」でアプリ化できます。</div>
</div>
<script>
// リズムパターンを「裏打ち」「シンコペーション」強化版にアップデート！
const patterns={
 '8分ストローク': ['D','U','D','U','D','U','D','U'],
 'レゲエ風(裏打ち)': [null,'U',null,'U',null,'U',null,'U'],
 '8分シンコペーション': ['D',null,'D','U',null,'U','D','U'],
 '2・4拍ミュート': ['D','U','M','U','D','U','M','U'],
 'カッティング基礎': ['D','M','M','U','M','U','D','M'],
 'ファンク16分ノリ': ['D','M','D','U','M','U','D','M','M','U','D','M','D','M','M','U'],
 'シャッフル風': ['D',null,'U','D',null,'U','D',null,'U','D',null,'U']
};
const symbols={D:'↓',U:'↑',M:'×'}; const labels={D:'ダウン',U:'アップ',M:'ミュート'};
let audio, timer=[], startTime=0, active=false, notes=[], nextIdx=0, judged=[], stats;
const $=id=>document.getElementById(id);
Object.keys(patterns).forEach(k=>{let o=document.createElement('option');o.textContent=k;$('pattern').appendChild(o)});
function ensureAudio(){ if(!audio) audio=new (window.AudioContext||window.webkitAudioContext)(); if(audio.state==='suspended') audio.resume(); }
function tone(freq=880,dur=.055,type='sine',vol=.18,when=audio.currentTime){ const osc=audio.createOscillator(), g=audio.createGain(); osc.type=type; osc.frequency.setValueAtTime(freq,when); g.gain.setValueAtTime(vol,when); g.gain.exponentialRampToValueAtTime(.001,when+dur); osc.connect(g); g.connect(audio.destination); osc.start(when); osc.stop(when+dur+.02); }
function clickSound(strong=false,when=audio.currentTime){ tone(strong?1180:760,.045,strong?'triangle':'square',strong?.16:.09,when); }
function actionSound(a){ tone(a==='D'?180:a==='U'?300:120,.08,a==='M'?'sawtooth':'triangle',.16); }
function renderLane(){ const p=patterns[$('pattern').value], n=p.length; $('beats').innerHTML=''; $('nums').innerHTML=''; for(let i=0;i<n;i++){let b=document.createElement('div'); b.className='beat'; b.id='b'+i; b.textContent=p[i]?symbols[p[i]]:'·'; b.style.color=p[i]==='D'?'#ef6478':p[i]==='U'?'#5ba7e8':p[i]==='M'?'#9274df':'#b7aecb'; $('beats').appendChild(b)} for(let i=0;i<n;i++){let d=document.createElement('div'); d.textContent=(n===16)?(i%4===0?(i/4+1):'·'):(i%2===0?(i/2+1):'&'); $('nums').appendChild(d)} }
$('pattern').onchange=renderLane; renderLane();
function clearTimers(){timer.forEach(clearTimeout); timer=[];}
function start(){ ensureAudio(); clearTimers(); active=true; nextIdx=0; judged=[]; stats={perfect:0,good:0,ok:0,miss:0,total:0}; renderLane(); $('score').textContent='3秒カウントダウン'; let count=3; $('judge').firstChild.nodeValue='3'; const beatSec=60/(+$('bpm').value||80); [0,1,2,3].forEach(i=>timer.push(setTimeout(()=>{ if(i<3){$('judge').firstChild.nodeValue=String(3-i); tone(660,.09,'triangle',.2)} else { $('judge').firstChild.nodeValue='GO!'; beginPlay(beatSec); }},i*700))); }
function beginPlay(beatSec){ const pat=patterns[$('pattern').value]; const stepSec = pat.length===16 ? beatSec/4 : pat.length===12 ? beatSec/3 : beatSec/2; const bars=+$('bars').value; notes=[]; let t=audio.currentTime+.25; startTime=performance.now()+250; for(let bar=0;bar<bars;bar++){ for(let i=0;i<pat.length;i++){ const action=pat[i]; const idx=bar*pat.length+i; notes.push({time:startTime+(bar*pat.length+i)*stepSec*1000, action, lane:i%pat.length, judged:!action}); const when=t+(bar*pat.length+i)*stepSec; if(i===0) clickSound(true,when); else clickSound(false,when); }} stats.total=notes.filter(n=>n.action).length; notes.forEach((n,idx)=>{ timer.push(setTimeout(()=>markNow(idx), Math.max(0,n.time-performance.now()))); timer.push(setTimeout(()=>autoMiss(idx), Math.max(0,n.time-performance.now()+210))); }); timer.push(setTimeout(finish, Math.max(0, notes.at(-1).time-performance.now()+650))); }
function markNow(idx){ if(!active)return; document.querySelectorAll('.beat').forEach(e=>e.classList.remove('now')); const n=notes[idx]; const el=$('b'+n.lane); if(el){el.classList.add('now'); setTimeout(()=>el.classList.remove('now'),130)} }
function autoMiss(idx){ const n=notes[idx]; if(!active||!n.action||n.judged)return; n.judged=true; stats.miss++; showJudge('MISS…', 'もう一回！'); }
function hit(action){ if(!active)return; ensureAudio(); actionSound(action); const now=performance.now(); let best=-1, diff=9999; for(let i=0;i<notes.length;i++){const n=notes[i]; if(!n.action||n.judged)continue; const d=Math.abs(now-n.time); if(d<diff){diff=d; best=i}} if(best<0||diff>260){stats.miss++; showJudge('MISS…','タイミング外'); return;} const n=notes[best]; n.judged=true; let text,sub; if(n.action!==action){stats.miss++; text='ちがう！'; sub=`${labels[n.action]}だよ`; } else if(diff<=55){stats.perfect++; text='PERFECT!'; sub='最高！'; } else if(diff<=115){stats.good++; text='いいね！'; sub='ナイス'; } else {stats.ok++; text='OK!'; sub='あと少し'; } const el=$('b'+n.lane); if(el){el.classList.add('hit'); setTimeout(()=>el.classList.remove('hit'),140)} showJudge(text,sub); }
function showJudge(t,s){ $('judge').firstChild.nodeValue=t; const done=stats.perfect+stats.good+stats.ok+stats.miss; $('score').textContent=`${s}　${done}/${stats.total}　P:${stats.perfect} いいね:${stats.good} OK:${stats.ok} MISS:${stats.miss}`; $('flash').classList.add('on'); setTimeout(()=>$('flash').classList.remove('on'),120); }
function finish(){ active=false; clearTimers(); const rate=Math.round((stats.perfect*1+stats.good*.75+stats.ok*.45)/Math.max(1,stats.total)*100); $('judge').firstChild.nodeValue= rate>=90?'天才！':rate>=70?'いいね！':rate>=50?'もう少し！':'練習しよ！'; $('score').textContent=`スコア ${rate}%　PERFECT ${stats.perfect}/${stats.total}`; document.querySelectorAll('.beat').forEach(e=>e.classList.remove('now')); }
function stop(){active=false; clearTimers(); $('judge').firstChild.nodeValue='Ready?'; $('score').textContent='停止しました'; document.querySelectorAll('.beat').forEach(e=>e.classList.remove('now'));}
$('start').onclick=start; $('stop').onclick=stop; $('down').onclick=()=>hit('D'); $('up').onclick=()=>hit('U'); $('mute').onclick=()=>hit('M');
document.addEventListener('keydown',e=>{const k=e.key.toLowerCase(); if(k==='d')hit('D'); if(k==='f')hit('U'); if(k==='j')hit('M'); if(k===' ')start();});

// --- PWA用のインストール制御処理 ---
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  $('installBtn').style.display = 'block';
  $('iosHint').style.display = 'none';
});
$('installBtn').onclick = async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') {
      $('installBtn').style.display = 'none';
    }
    deferredPrompt = null;
  }
};
if ('serviceWorker' in navigator) {
  const swCode = "self.addEventListener('fetch', function(e){});";
  const blob = new Blob([swCode], {type: 'text/javascript'});
  const url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url);
}
</script>
</body>
</html>
