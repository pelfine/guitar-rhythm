<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffc857" />
  <title>Rhythm Master</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800;900&family=Nunito:wght@800;900&display=swap');
    :root{
      --purple:#37285f;
      --lav:#8376a8;
      --cream:#fff9ef;
      --cream2:#fff1d2;
      --yellow:#ffdc5c;
      --yellow2:#ffc857;
      --pink:#ef6375;
      --blue:#5aa6e8;
      --mint:#b8d7a6;
      --violet:#9174e6;
      --line:#37285f;
      --shadow:0 9px 0 rgba(55,40,95,.98),0 18px 28px rgba(55,40,95,.18);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
    body{
      margin:0; min-height:100svh;
      font-family:"M PLUS Rounded 1c","Nunito",-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
      background:
        repeating-linear-gradient(135deg, rgba(255,203,92,.28) 0 34px, rgba(255,180,66,.24) 34px 68px),
        linear-gradient(160deg,#ffd27b 0%,#ffb64d 100%);
      color:var(--purple); overflow-x:hidden; overflow-y:auto;
    }
    .app{width:min(930px,100%); min-height:100svh; margin:0 auto; padding:8px 10px 12px; display:flex; flex-direction:column; gap:8px}
    .shell{background:var(--cream); border:7px solid var(--purple); border-radius:30px; padding:10px 10px 12px; box-shadow:0 10px 0 rgba(55,40,95,.18)}
    header{display:grid; grid-template-columns:1fr; align-items:center; gap:4px; margin-bottom:7px}
    h1{font-size:clamp(27px,7.2vw,50px); margin:0; letter-spacing:.04em; color:var(--purple); line-height:1.05; font-weight:900; text-align:center}
    .subtitle{font-size:clamp(15px,4vw,24px); color:var(--lav); text-align:center; font-weight:900; line-height:1.25; margin:2px 0 6px}
    .panel{background:var(--cream2); border:5px solid var(--purple); border-radius:24px; box-shadow:0 6px 0 rgba(55,40,95,.98); padding:9px}
    .controls{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; align-items:end}
    label{font-size:12px; font-weight:900; display:block; margin:0 0 4px 6px; color:var(--lav)}
    select,input{width:100%; border:5px solid var(--purple); border-radius:18px; padding:9px 8px; background:#fff; color:var(--purple); font-size:16px; font-weight:900; outline:none; font-family:inherit; min-height:50px}
    .buttons{display:grid; grid-template-columns:2fr 1fr; gap:8px; grid-column:1/-1}
    button{border:5px solid var(--purple); border-radius:19px; padding:10px 10px; font-size:20px; font-weight:900; color:var(--purple); box-shadow:0 7px 0 rgba(55,40,95,.98); cursor:pointer; touch-action:manipulation; font-family:inherit}
    button:active{transform:translateY(5px); box-shadow:0 4px 0 rgba(55,40,95,.98)}
    #startBtn{background:var(--yellow); font-size:clamp(23px,6.3vw,38px); min-height:58px}
    #stopBtn{background:#fff; color:var(--purple); min-height:58px}
    .stage{position:relative; height:clamp(275px,43svh,430px); overflow:hidden; background:linear-gradient(#fffefb,#fff8ef); border-radius:26px; border:5px solid var(--purple); box-shadow:0 6px 0 rgba(55,40,95,.98); margin-top:10px}
    .lane{position:absolute; left:0; right:0; top:35%; height:92px; transform:translateY(-50%); background:linear-gradient(90deg,transparent,rgba(255,220,92,.32),transparent); border-top:4px solid rgba(55,40,95,.72); border-bottom:4px solid rgba(55,40,95,.72)}
    .judgeLine{position:absolute; left:50%; top:18%; bottom:38%; width:6px; border-radius:6px; background:var(--pink); box-shadow:0 0 0 7px rgba(239,99,117,.14)}
    .note{position:absolute; top:35%; width:60px; height:78px; margin-left:-30px; transform:translateY(-50%); display:grid; place-items:center; filter:drop-shadow(0 7px 7px rgba(55,40,95,.20))}
    .note>div{width:58px;height:70px;border:5px solid var(--purple);border-radius:999px;background:#fff;display:grid;place-items:center;padding-top:2px}
    .note .symbol{font-size:30px; line-height:1; color:var(--purple)}
    .note .arrow{font-size:25px; font-weight:1000; margin-top:-5px; color:var(--pink); text-shadow:1px 2px 0 #fff}
    .note.up .arrow{color:var(--blue)}.note.mute .arrow{color:var(--violet)}.note.rest{opacity:.35}
    .pawWrap{position:absolute; left:0; right:0; bottom:12px; display:grid; place-items:center; gap:5px; pointer-events:none}
    #pawBtn{pointer-events:auto; width:min(150px,38vw); aspect-ratio:1/1; border-radius:32px; background:linear-gradient(#fff,#fff1d2); border:6px solid var(--purple); box-shadow:0 8px 0 rgba(55,40,95,.98),0 16px 20px rgba(55,40,95,.20); font-size:62px; display:grid; place-items:center; padding:0}
    #pawBtn.hit{animation:pop .18s ease-out}@keyframes pop{50%{transform:scale(1.08)}}
    .hint{font-size:11px; font-weight:900; background:#fff; border-radius:999px; padding:5px 10px; border:3px solid var(--purple); color:var(--lav); text-align:center}
    .countdown,.judge{position:absolute; inset:0; display:grid; place-items:center; text-align:center; pointer-events:none; font-weight:1000}
    .countdown{font-size:clamp(58px,18vw,130px); color:var(--purple); text-shadow:4px 6px 0 #fff; z-index:5}.countdown:empty{display:none}
    .judge{align-items:start; padding-top:22%; font-size:clamp(32px,10vw,70px); color:var(--pink); text-shadow:3px 4px 0 #fff; z-index:4}.judge:empty{display:none}
    .scorebar{display:grid; grid-template-columns:repeat(3,1fr); gap:7px; text-align:center; margin-top:10px}
    .scorebox{background:#fff; border:4px solid var(--purple); border-radius:17px; padding:5px 3px; font-size:13px; font-weight:1000; box-shadow:0 4px 0 rgba(55,40,95,.98)}.scorebox span{display:block; color:var(--pink); font-size:20px; line-height:1.1}
    .footer{font-size:12px; text-align:center; opacity:.75; font-weight:900; margin-top:12px}
    
    @media (max-height:740px){
      .app{padding:5px 8px 8px}.shell{padding:8px;border-width:6px;border-radius:26px}
      h1{font-size:clamp(24px,6.5vw,40px)}.subtitle{font-size:14px;margin-bottom:4px}
      .panel{padding:7px}.controls{gap:6px}label{font-size:11px}select,input{min-height:44px;padding:6px;font-size:14px;border-width:4px}
      #startBtn,#stopBtn{min-height:48px;font-size:20px}.scorebar{margin-top:7px}.stage{height:38svh;min-height:250px;margin-top:8px}
      #pawBtn{width:min(132px,35vw);font-size:54px}.hint{display:none}
    }

  </style>
</head>
<body>
  <div class="app">
    <div class="shell">
    <header>
      <h1>ð¸ Rhythm Master</h1>
      <div class="subtitle">æ­£ããã¿ã¤ãã³ã°ã§ð¾ãæ¼ããï¼</div>
    </header>

    <section class="panel controls">
      <div><label for="bpm">BPM</label><input id="bpm" type="number" min="50" max="220" value="100"></div>
      <div><label for="pattern">ãªãºã </label><select id="pattern">
        <option value="eighth">8åï¼â â â â</option>
        <option value="offbeat">è£æã¡ï¼ä¼ â ä¼ â</option>
        <option value="sixteenth">16åï¼â â â â</option>
        <option value="shuffle">ã·ã£ããã«ï¼â â â â</option>
        <option value="mute">ã«ããã£ã³ã°ï¼â Ã â Ã</option>
      </select></div>
      <div><label for="bars">å°ç¯æ°</label><select id="bars"><option>2</option><option selected>4</option><option>8</option></select></div>
      <div class="buttons"><button id="startBtn">ã¹ã¿ã¼ã</button><button id="stopBtn">åæ­¢</button></div>
    </section>

    <section class="scorebar">
      <div class="scorebox">SCORE<span id="score">0</span></div>
      <div class="scorebox">COMBO<span id="combo">0</span></div>
      <div class="scorebox">BEST<span id="best">0</span></div>
    </section>

    <main class="stage" id="stage">
      <div class="lane"></div>
      <div class="judgeLine"></div>
      <div class="countdown" id="countdown">Ready?</div>
      <div class="judge" id="judgeText"></div>
      <div class="pawWrap"><button id="pawBtn" aria-label="ãªãºã ã«åããã¦æ¼ã">ð¾</button><div class="hint">é³ç¬¦ãç·ã«æ¥ããð¾ãã¿ããï¼</div></div>
    </main>
    <div class="footer">iPhoneã¯å±æãã¿ã³ âããã¼ã ç»é¢ã«è¿½å ãã§ã¢ããªåã§ãã¾ã</div>
    </div>
  </div>
<script>
(() => {
  const stage = document.getElementById('stage');
  const startBtn = document.getElementById('startBtn');
  const stopBtn = document.getElementById('stopBtn');
  const pawBtn = document.getElementById('pawBtn');
  const bpmInput = document.getElementById('bpm');
  const patternSelect = document.getElementById('pattern');
  const barsSelect = document.getElementById('bars');
  const countdown = document.getElementById('countdown');
  const judgeText = document.getElementById('judgeText');
  const scoreEl = document.getElementById('score');
  const comboEl = document.getElementById('combo');
  const bestEl = document.getElementById('best');

  let audioCtx = null;
  let running = false;
  let rafId = 0;
  let timers = [];
  let notes = [];
  let startTime = 0;
  let score = 0, combo = 0, best = Number(localStorage.getItem('grmBest') || 0);
  let endTimer = 0;
  bestEl.textContent = best;

  const PATTERNS = {
    eighth:   [{b:0,d:'down'}, {b:.5,d:'up'}, {b:1,d:'down'}, {b:1.5,d:'up'}, {b:2,d:'down'}, {b:2.5,d:'up'}, {b:3,d:'down'}, {b:3.5,d:'up'}],
    offbeat:  [{b:.5,d:'up'}, {b:1.5,d:'up'}, {b:2.5,d:'up'}, {b:3.5,d:'up'}],
    sixteenth:[{b:0,d:'down'}, {b:.25,d:'up'}, {b:.5,d:'down'}, {b:.75,d:'up'}, {b:1,d:'down'}, {b:1.25,d:'up'}, {b:1.5,d:'down'}, {b:1.75,d:'up'}, {b:2,d:'down'}, {b:2.25,d:'up'}, {b:2.5,d:'down'}, {b:2.75,d:'up'}, {b:3,d:'down'}, {b:3.25,d:'up'}, {b:3.5,d:'down'}, {b:3.75,d:'up'}],
    shuffle:  [{b:0,d:'down'}, {b:2/3,d:'up'}, {b:1,d:'down'}, {b:1+2/3,d:'up'}, {b:2,d:'down'}, {b:2+2/3,d:'up'}, {b:3,d:'down'}, {b:3+2/3,d:'up'}],
    mute:     [{b:0,d:'down'}, {b:.5,d:'mute'}, {b:1,d:'up'}, {b:1.5,d:'mute'}, {b:2,d:'down'}, {b:2.5,d:'mute'}, {b:3,d:'up'}, {b:3.5,d:'mute'}]
  };
  const icons = {down:'âª', up:'â«', mute:'â¬'};
  const arrows = {down:'â', up:'â', mute:'Ã'};

  function setTimer(fn, ms){ const id = setTimeout(fn, ms); timers.push(id); return id; }
  function clearAllTimers(){ timers.forEach(clearTimeout); timers = []; clearTimeout(endTimer); }
  function ensureAudio(){ if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if(audioCtx.state === 'suspended') audioCtx.resume(); }
  function beep(freq=880, dur=.045, type='sine', vol=.06){
    if(!running || !audioCtx) return;
    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
    osc.type = type; osc.frequency.value = freq; gain.gain.value = vol;
    osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + dur);
  }
  function resetScore(){ score=0; combo=0; scoreEl.textContent=0; comboEl.textContent=0; }
  function makeNotes(){
    const bpm = Number(bpmInput.value) || 100; const beatMs = 60000 / bpm; const bars = Number(barsSelect.value);
    const base = PATTERNS[patternSelect.value]; notes = [];
    for(let bar=0; bar<bars; bar++) base.forEach(n => notes.push({...n, time:(bar*4+n.b)*beatMs, hit:false, missed:false}));
    return {beatMs, totalMs: bars*4*beatMs};
  }
  function drawNote(n, travelMs){
    const el = document.createElement('div'); el.className = `note ${n.d}`;
    el.innerHTML = `<div><div class="symbol">${icons[n.d]}</div><div class="arrow">${arrows[n.d]}</div></div>`;
    stage.appendChild(el); n.el = el; n.spawn = n.time - travelMs;
  }
  function showJudge(text){ judgeText.textContent = text; setTimer(()=>{ if(judgeText.textContent === text) judgeText.textContent=''; }, 450); }
  function hit(){
    if(!running) return;
    const now = performance.now() - startTime;
    let target = null, diff = Infinity;
    notes.forEach(n => { if(!n.hit && !n.missed){ const d = Math.abs(now - n.time); if(d < diff){ diff=d; target=n; } } });
    if(!target || diff > 210){ combo=0; comboEl.textContent=0; showJudge('MISSâ¦'); beep(180,.08,'sawtooth',.035); return; }
    target.hit = true; target.el?.remove();
    let add = 50, word = 'GOOD!';
    if(diff <= 70){ add=120; word='PERFECT!!'; }
    else if(diff <= 130){ add=80; word='GREAT!'; }
    combo++; score += add + Math.min(combo*2, 60);
    scoreEl.textContent = score; comboEl.textContent = combo; showJudge(word); beep(target.d==='up'?1046:target.d==='mute'?520:784,.045,'triangle',.07);
    pawBtn.classList.remove('hit'); void pawBtn.offsetWidth; pawBtn.classList.add('hit');
  }
  function loop(){
    if(!running) return;
    const now = performance.now() - startTime; const w = stage.clientWidth; const judgeX = w * .5; const travelMs = 2300;
    notes.forEach(n => {
      if(!n.el || n.hit) return;
      const progress = (now - n.spawn) / travelMs; const x = -80 + progress * (judgeX + 80);
      n.el.style.left = `${x}px`;
      if(!n.missed && now - n.time > 220){ n.missed = true; combo=0; comboEl.textContent=0; showJudge('MISSâ¦'); n.el.remove(); }
    });
    rafId = requestAnimationFrame(loop);
  }
  function start(){
    stop(); running = true; ensureAudio(); resetScore(); const {beatMs,totalMs} = makeNotes(); const travelMs = 2300;
    countdown.textContent = '3'; beep(660,.06);
    setTimer(()=>{ if(running){ countdown.textContent='2'; beep(660,.06); }}, 700);
    setTimer(()=>{ if(running){ countdown.textContent='1'; beep(660,.06); }}, 1400);
    setTimer(()=>{ if(!running) return; countdown.textContent='GO!'; beep(990,.08); startTime = performance.now(); notes.forEach(n=>drawNote(n,travelMs)); loop();
      for(let t=0; t<=totalMs; t+=beatMs) setTimer(()=>beep(440,.035,'square',.025), t);
      endTimer = setTimer(()=>stop(false), totalMs + 1300);
    }, 2100);
    setTimer(()=>{ if(running && countdown.textContent==='GO!') countdown.textContent=''; }, 2600);
  }
  function stop(resetMessage=true){
    running = false; cancelAnimationFrame(rafId); clearAllTimers(); document.querySelectorAll('.note').forEach(e=>e.remove()); notes=[];
    if(audioCtx && audioCtx.state !== 'closed') audioCtx.suspend().catch(()=>{});
    countdown.textContent = resetMessage ? 'Ready?' : 'Finish!'; judgeText.textContent='';
    if(score > best){ best = score; localStorage.setItem('grmBest', best); bestEl.textContent = best; }
  }
  startBtn.addEventListener('click', start);
  stopBtn.addEventListener('click', () => stop(true));
  pawBtn.addEventListener('pointerdown', hit);
  window.addEventListener('keydown', e => { if(e.code === 'Space'){ e.preventDefault(); hit(); } });
  document.addEventListener('visibilitychange', () => { if(document.hidden) stop(true); });
})();
</script>
</body>
