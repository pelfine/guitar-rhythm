<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#ffc857">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Rhythm Master">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Rhythm Master</title>
<style>
:root{--bg:#fff4dd;--cream:#fffaf0;--yellow:#ffc857;--purple:#4b3476;--pink:#ff7aa8;--ink:#33224f;--good:#41c886;--bad:#ff5a72}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:linear-gradient(160deg,#fff8e8,#ffe7b2 58%,#d9c4ff);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Maru Gothic ProN","Hiragino Sans","Yu Gothic UI","Yu Gothic",sans-serif;font-weight:900;color:var(--ink);touch-action:manipulation}
.app{height:100dvh;max-width:480px;margin:0 auto;padding:env(safe-area-inset-top) 14px env(safe-area-inset-bottom);display:flex;flex-direction:column;gap:8px}
.top{text-align:center;padding-top:8px}
.title{font-size:30px;color:var(--purple);letter-spacing:.5px;text-shadow:0 3px 0 #fff,0 7px 13px #9b7a4280}
.sub{font-size:14px;color:#6b568a;text-shadow:0 2px 0 #fff}
.panel{background:rgba(255,250,240,.9);border:3px solid #fff;border-radius:28px;box-shadow:0 10px 0 #d7b66b,0 18px 28px #855b2080,inset 0 -6px 0 #ffe2a3;padding:10px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.stat{background:#fff;border-radius:18px;text-align:center;padding:7px 3px;box-shadow:inset 0 -4px 0 #f2d88f,0 3px 0 #e0bb69;font-size:11px}
.stat b{display:block;font-size:17px;color:var(--purple);line-height:1.05}
.stage{position:relative;flex:1;min-height:230px;overflow:hidden;background:linear-gradient(#fffaf2,#fff0c9);border:4px solid #fff;border-radius:30px;box-shadow:inset 0 -8px 0 #f0c86c,0 8px 0 #cda459}
.count{position:absolute;inset:0;display:none;place-items:center;z-index:5;font-size:64px;color:var(--pink);text-shadow:0 5px 0 #fff,0 12px 24px #7d3f9080}
.line{position:absolute;left:26%;top:28px;bottom:54px;width:6px;border-radius:10px;background:var(--pink);box-shadow:0 0 0 5px #fff,0 0 18px #ff75a8}
.staff{position:absolute;left:0;right:0;top:58px;height:92px}
.staff i{position:absolute;left:0;right:0;height:3px;background:#8d79aa;opacity:.9}
.staff i:nth-child(1){top:0}.staff i:nth-child(2){top:20px}.staff i:nth-child(3){top:40px}.staff i:nth-child(4){top:60px}.staff i:nth-child(5){top:80px}
.note{position:absolute;width:38px;height:64px;transform:translate(-50%,-50%);will-change:left}
.note svg{width:38px;height:48px;filter:drop-shadow(0 3px 0 #fff)}
.mark{font-size:23px;text-align:center;line-height:18px;color:var(--purple);text-shadow:0 2px 0 #fff}
.ghost{opacity:.35}
.judge{position:absolute;left:0;right:0;bottom:86px;text-align:center;font-size:32px;color:var(--purple);text-shadow:0 4px 0 #fff,0 8px 18px #6a4a9d80;opacity:0;transform:scale(.6)}
.judge.show{animation:pop .45s ease}
.pawWrap{display:grid;place-items:center;padding:3px 0}
.paw{width:126px;height:94px;border:0;border-radius:50px;background:linear-gradient(#fff,#ffe0f0);box-shadow:0 9px 0 #cc8aa9,0 16px 22px #7b507780,inset 0 -8px 0 #ffc1db;color:#4b3476;font-size:50px;line-height:1;cursor:pointer}
.paw:active,.paw.hit{transform:translateY(6px) scale(1.06);box-shadow:0 3px 0 #cc8aa9,0 9px 15px #7b507780,inset 0 -5px 0 #ffc1db}
.paw.good{animation:puni .32s ease}
.paw.bad{animation:shake .32s ease}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn,select,input{border:0;border-radius:22px;font:inherit;font-weight:900;color:var(--ink);background:#fff7e8;box-shadow:0 6px 0 #cba456,inset 0 -4px 0 #f2d48c;padding:12px 10px;min-width:0}
.btn.primary{background:linear-gradient(#ffe27a,#ffc857);color:#4b3476}
.btn.stop{background:linear-gradient(#f2d7ff,#cda9ff)}
.opts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.field{background:#fffdf7;border-radius:18px;padding:6px;box-shadow:inset 0 -4px 0 #f0d8a6}
.field label{display:block;font-size:10px;color:#7a6597;text-align:center}
.field select,.field input{width:100%;padding:6px 2px;text-align:center;background:transparent;box-shadow:none;border-radius:0;font-size:15px}
.help{text-align:center;font-size:11px;color:#745e8d;line-height:1.25}
.flash{position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 26% 42%,#fff 0,#fff8 18%,transparent 36%);opacity:0}
.flash.on{animation:flash .25s ease}
@keyframes pop{0%{opacity:0;transform:scale(.5) translateY(20px)}35%{opacity:1;transform:scale(1.2)}100%{opacity:0;transform:scale(1) translateY(-20px)}}
@keyframes puni{0%,100%{transform:scale(1)}45%{transform:scale(1.16,.86)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes flash{0%{opacity:0}40%{opacity:1}100%{opacity:0}}
@media(max-height:700px){.title{font-size:24px}.panel{padding:7px}.stage{min-height:190px}.paw{width:112px;height:78px;font-size:42px}.judge{bottom:70px;font-size:28px}.btn,select,input{padding:9px 6px}}
</style>
</head>
<body>
<main class="app">
<header class="top">
<div class="title">🎸 Rhythm Master</div>
<div class="sub">正しいタイミングで🐾を押そう！</div>
</header>

<section class="panel stats">
<div class="stat">SCORE<b id="score">0</b></div>
<div class="stat">COMBO<b id="combo">0</b></div>
<div class="stat">BEST<b id="best">0</b></div>
<div class="stat">判定<b id="last">-</b></div>
</section>

<section class="stage" id="stage">
<div class="count" id="count">3</div>
<div class="line"></div>
<div class="staff"><i></i><i></i><i></i><i></i><i></i></div>
<div class="judge" id="judge">Perfect!!</div>
<div class="flash" id="flash"></div>
</section>

<div class="pawWrap">
<button class="paw" id="paw" aria-label="押す">🐾</button>
</div>

<section class="controls">
<button class="btn primary" id="start">START</button>
<button class="btn stop" id="stop">STOP</button>
</section>

<section class="opts">
<div class="field"><label>BPM</label><input id="bpm" type="number" min="60" max="180" value="96"></div>
<div class="field"><label>リズム</label><select id="pattern"><option value="quarter">4分</option><option value="eighth">8分</option><option value="offbeat">裏打ち</option><option value="sixteenth">16分</option><option value="shuffle">シャッフル</option><option value="cutting">カッティング</option></select></div>
<div class="field"><label>小節</label><select id="bars"><option>4</option><option>8</option><option>12</option></select></div>
</section>

<div class="help">音が出ない時は、最初にスタートか🐾を1回タップしてください。停止で音・判定・タイマー全部止まります。</div>
</main>

<script>
(()=>{
const $=id=>document.getElementById(id);
const stage=$('stage'),paw=$('paw'),judge=$('judge'),flash=$('flash'),count=$('count');
const scoreEl=$('score'),comboEl=$('combo'),bestEl=$('best'),lastEl=$('last');
const bpmEl=$('bpm'),patEl=$('pattern'),barsEl=$('bars');
let ac,master,running=false,startT=0,raf=0,timers=[],notes=[],score=0,combo=0;
let best=+localStorage.rhythmMasterBest||0,look=2.6,speed=0;
bestEl.textContent=best;

const W=()=>stage.clientWidth;
const lineX=()=>W()*.26;

function audio(){
 if(!ac){
  ac=new(window.AudioContext||window.webkitAudioContext)();
  master=ac.createGain();
  master.gain.value=.35;
  master.connect(ac.destination);
 }
 if(ac.state==='suspended')ac.resume();
}

function beep(freq=880,dur=.06,type='sine',vol=.45,when=0){
 audio();
 let t=ac.currentTime+when,o=ac.createOscillator(),g=ac.createGain();
 o.type=type;
 o.frequency.value=freq;
 g.gain.setValueAtTime(0,t);
 g.gain.linearRampToValueAtTime(vol,t+.005);
 g.gain.exponentialRampToValueAtTime(.001,t+dur);
 o.connect(g);
 g.connect(master);
 o.start(t);
 o.stop(t+dur+.02);
}

function makePattern(kind,bars,bpm){
 let beat=60/bpm,arr=[];
 for(let bar=0;bar<bars;bar++){
  let base=bar*4*beat;
  if(kind==='quarter')for(let i=0;i<4;i++)arr.push([base+i*beat,i%2?'↑':'↓','n']);
  if(kind==='eighth')for(let i=0;i<8;i++)arr.push([base+i*beat/2,i%2?'↑':'↓','n']);
  if(kind==='offbeat')for(let i=0;i<4;i++)arr.push([base+i*beat+beat/2,'↑','n']);
  if(kind==='sixteenth')for(let i=0;i<16;i++)arr.push([base+i*beat/4,i%2?'↑':'↓','n']);
  if(kind==='shuffle')for(let i=0;i<4;i++){arr.push([base+i*beat,'↓','n']);arr.push([base+i*beat+beat*2/3,'↑','n']);}
  if(kind==='cutting')for(let i=0;i<8;i++){let mute=i===2||i===6;arr.push([base+i*beat/2,mute?'×':(i%2?'↑':'↓'),mute?'r':'n']);}
 }
 return arr.map((a,i)=>({id:i,t:a[0],mark:a[1],type:a[2],hit:false,miss:false,el:null}));
}

function noteSVG(rest=false){
 return rest
 ? `<svg viewBox="0 0 40 50"><path d="M19 6c9 2 12 11 6 18l-7 8 12 5-4 6-18-8 10-14c4-5 2-8-3-10z" fill="#7b62a6"/></svg>`
 : `<svg viewBox="0 0 40 50"><ellipse cx="15" cy="35" rx="11" ry="8" transform="rotate(-20 15 35)" fill="#4b3476"/><rect x="24" y="7" width="5" height="29" rx="2" fill="#4b3476"/><path d="M27 7c8 4 10 11 4 16" fill="none" stroke="#4b3476" stroke-width="5" stroke-linecap="round"/></svg>`;
}

function drawNotes(){
 notes.forEach(n=>{
  let d=document.createElement('div');
  d.className='note';
  d.innerHTML=noteSVG(n.type==='r')+`<div class="mark">${n.mark}</div>`;
  stage.appendChild(d);
  n.el=d;
 });
}

function clearNotes(){
 notes.forEach(n=>n.el&&n.el.remove());
 notes=[];
}

function reset(){
 score=0;combo=0;
 scoreEl.textContent=0;
 comboEl.textContent=0;
 lastEl.textContent='-';
 clearNotes();
}

function show(txt,cls){
 judge.textContent=txt;
 judge.className='judge show';
 lastEl.textContent=txt.replace('!!','');
 paw.classList.remove('good','bad','hit');
 void paw.offsetWidth;
 paw.classList.add(cls==='miss'?'bad':'good','hit');
 if(cls!=='miss')flash.className='flash on';
 setTimeout(()=>{
  judge.className='judge';
  paw.classList.remove('hit','good','bad');
  flash.className='flash';
 },420);
}

function updateScore(add){
 score+=add;
 scoreEl.textContent=score;
 if(score>best){
  best=score;
  localStorage.rhythmMasterBest=best;
  bestEl.textContent=best;
 }
}

function press(){
 if(!running)return;
 audio();
 beep(360,.035,'triangle',.25);
 let now=(performance.now()-startT)/1000;
 let target=null,err=99;
 notes.forEach(n=>{
  if(!n.hit&&!n.miss){
   let e=Math.abs(now-n.t);
   if(e<err){err=e;target=n;}
  }
 });
 if(!target||err>.22){
  combo=0;
  comboEl.textContent=0;
  show('Miss...','miss');
  return;
 }
 target.hit=true;
 target.el.classList.add('ghost');
 if(err<.055){
  combo++;
  updateScore(100+combo*3);
  show('Perfect!!','perfect');
 }else if(err<.12){
  combo++;
  updateScore(70+combo*2);
  show('Great!','great');
 }else{
  combo++;
  updateScore(40);
  show('Good!','good');
 }
 comboEl.textContent=combo;
}

function loop(){
 if(!running)return;
 let now=(performance.now()-startT)/1000;
 notes.forEach(n=>{
  if(n.el){
   let x=lineX()+(n.t-now)*speed;
   let y=104+(n.id%4-1.5)*5;
   n.el.style.left=x+'px';
   n.el.style.top=y+'px';
   if(!n.hit&&!n.miss&&now-n.t>.24){
    n.miss=true;
    n.el.classList.add('ghost');
    combo=0;
    comboEl.textContent=0;
    show('Miss...','miss');
   }
  }
 });
 let end=notes.length?notes[notes.length-1].t+1.2:0;
 if(now>end)stop(false);
 raf=requestAnimationFrame(loop);
}

function metro(duration,bpm){
 let beat=60/bpm;
 for(let t=0;t<duration;t+=beat){
  let id=setTimeout(()=>beep(880,.045,'square',.22),t*1000);
  timers.push(id);
 }
}

function start(){
 stop(false);
 audio();
 reset();
 let bpm=Math.max(60,Math.min(180,+bpmEl.value||96));
 let bars=+barsEl.value;
 notes=makePattern(patEl.value,bars,bpm);
 drawNotes();
 speed=(W()*0.82)/look;
 count.style.display='grid';
 let seq=['3','2','1','GO!!'];
 for(let i=0;i<seq.length;i++){
  timers.push(setTimeout(()=>{
   count.textContent=seq[i];
   beep(i<3?520:740,.09,'triangle',.5);
  },i*620));
 }
 timers.push(setTimeout(()=>{
  count.style.display='none';
  running=true;
  startT=performance.now();
  metro(notes[notes.length-1].t+1,bpm);
  loop();
 },2500));
}

function stop(clear=true){
 running=false;
 cancelAnimationFrame(raf);
 timers.forEach(clearTimeout);
 timers=[];
 count.style.display='none';
 if(clear)show('停止','good');
 if(master&&ac)master.gain.cancelScheduledValues(ac.currentTime);
}

paw.addEventListener('pointerdown',press);
$('start').addEventListener('click',start);
$('stop').addEventListener('click',()=>stop(true));
document.addEventListener('visibilitychange',()=>{if(document.hidden)stop(false);});
})();
</script>
</body>
</html>
